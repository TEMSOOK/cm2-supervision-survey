/* ── API ─────────────────────────────────────────────────────────── */
async function apiLoad() {
  if (SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE') {
    try { const d=localStorage.getItem('survey_local'); if(d) S.subs=JSON.parse(d); } catch{}
    S.page='survey'; render(); return;
  }
  try {
    const res  = await fetch(SCRIPT_URL+'?t='+Date.now());
    const json = await res.json();
    S.subs = json.ok ? (json.data||[]) : [];
    S.loadError = !json.ok;
  } catch { S.subs=[]; S.loadError=true; }
  S.page='survey'; render();
}

async function apiSave(sub) {
  if (SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE') {
    try { localStorage.setItem('survey_local', JSON.stringify(S.subs)); } catch{}
    return;
  }
  try {
    await fetch(SCRIPT_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(sub)
    });
  } catch(e){ console.warn('save error',e); }
}

async function apiRefresh() {
  if (SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE') return;
  try {
    const res  = await fetch(SCRIPT_URL+'?t='+Date.now());
    const json = await res.json();
    if(json.ok){ S.subs=json.data||[]; }
  } catch {}
}

/* ── สถิติ ──────────────────────────────────────────────────────── */
function mean(a){ return a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0; }
function sd(a){ const m=mean(a); return a.length?Math.sqrt(a.reduce((x,y)=>x+Math.pow(y-m,2),0)/a.length):0; }
function lvl(v){
  if(v>=4.5)return{t:'มากที่สุด',bg:'#E1F5EE',tx:'#085041'};
  if(v>=3.5)return{t:'มาก',bg:'#EAF3DE',tx:'#27500A'};
  if(v>=2.5)return{t:'ปานกลาง',bg:'#FAEEDA',tx:'#633806'};
  if(v>=1.5)return{t:'น้อย',bg:'#FAECE7',tx:'#712B13'};
  return{t:'น้อยที่สุด',bg:'#FCEBEB',tx:'#501313'};
}

/* ── HTML helpers ───────────────────────────────────────────────── */
function badge(l){ return `<span style="background:${l.bg};color:${l.tx};font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block">${l.t}</span>`; }
function secPill(s){ return `<span style="background:${s.bg};color:${s.dk};font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0">${s.badge}</span>`; }
function card(html,mb){ return `<div style="background:#fff;border:.5px solid #dde3ee;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:${mb||14}px;overflow-x:auto">${html}</div>`; }

/* ── ตารางค่าสถิติ ──────────────────────────────────────────────── */
function statsTable(scoresBySec, caption){
  const rows = SEC.map(s=>{ const a=scoresBySec[s.id]||[]; return{...s,m:mean(a),sd:sd(a)}; });
  const all  = Object.values(scoresBySec).flat();
  const om=mean(all), osd=sd(all), ol=lvl(om);
  let h=`<div style="font-size:14px;font-weight:500;margin-bottom:${caption?4:12}px">ตารางค่าสถิติความพึงพอใจ</div>`;
  if(caption) h+=`<div style="font-size:11px;color:#888;margin-bottom:12px">${caption}</div>`;
  h+=`<table class="stats-tbl"><thead><tr>
    <th>รายการประเมิน</th>
    <th class="tc" style="width:96px">ค่าเฉลี่ย (x̄)</th>
    <th class="tc" style="width:80px">S.D.</th>
    <th class="tc" style="width:110px">แปลผล</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{ const l=lvl(r.m); h+=`<tr><td><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${secPill(r)}<span>${r.title}</span></div></td><td class="tc" style="font-weight:600;font-size:14px">${r.m.toFixed(2)}</td><td class="tc" style="color:#666">${r.sd.toFixed(2)}</td><td class="tc">${badge(l)}</td></tr>`; });
  h+=`<tr class="foot"><td>ภาพรวมทั้งหมด</td><td class="tc" style="font-size:15px">${om.toFixed(2)}</td><td class="tc">${osd.toFixed(2)}</td><td class="tc">${badge(ol)}</td></tr></tbody></table>
  <div style="font-size:11px;color:#888;margin-top:10px;line-height:1.8">เกณฑ์แปลผล: 4.50–5.00 = มากที่สุด | 3.50–4.49 = มาก | 2.50–3.49 = ปานกลาง | 1.50–2.49 = น้อย | 1.00–1.49 = น้อยที่สุด</div>`;
  return card(h);
}

/* ── Live Panel ─────────────────────────────────────────────────── */
function livePanel(){
  const ans=S.answers, answered=ALL_Q.filter(q=>ans[q.id]);
  const done=answered.length, ov=done?mean(answered.map(q=>ans[q.id])):0;
  const pct=(done/TOTAL)*100;
  const r=46,cx=53,cy=53,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  const l=ov>0?lvl(ov):null;
  let bars='';
  SEC.forEach(s=>{
    const sa=s.q.filter(q=>ans[q.id]),avg=sa.length?mean(sa.map(q=>ans[q.id])):0;
    const p=avg>0?((avg-1)/4)*100:0,sl=avg>0?lvl(avg):null;
    bars+=`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;flex-wrap:wrap;gap:3px">
        <div style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${s.c};display:inline-block"></span><span style="font-size:11px">${s.short}</span></div>
        <div style="display:flex;align-items:center;gap:4px">${sl?badge(sl):''}<span style="font-size:11px;font-weight:500;min-width:26px;text-align:right">${avg>0?avg.toFixed(2):'—'}</span></div>
      </div>
      <div style="height:5px;background:#eee;border-radius:3px;overflow:hidden"><div style="height:100%;width:${p}%;background:${s.c};border-radius:3px;transition:width .4s"></div></div>
      <div style="font-size:10px;color:#aaa;margin-top:1px">${sa.length}/${s.q.length} ข้อ</div>
    </div>`;
  });
  return `<div class="sticky-panel" style="position:sticky;top:56px;background:#fff;border:.5px solid #dde3ee;border-radius:12px;overflow:hidden">
    <div style="background:#1A4E8C;padding:10px 16px">
      <div style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#fff">
        <span style="width:8px;height:8px;border-radius:50%;background:#7EC8F5;display:inline-block;animation:pulse 1.5s infinite"></span>สรุปผลแบบเรียลไทม์
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:1px">อัปเดตทุกครั้งที่เลือกคำตอบ</div>
    </div>
    <div style="padding:12px 16px 16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:.5px solid #eee">
        <svg width="106" height="106" style="flex-shrink:0">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#d0d0d0" stroke-width="8"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2563A8" stroke-width="8"
            stroke-dasharray="${circ} ${circ}" stroke-dashoffset="${offset}"
            stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset .5s"/>
          <text x="${cx}" y="${cy-2}" text-anchor="middle" style="font-size:19px;font-weight:600;fill:#222;font-family:Sarabun,sans-serif">${Math.round(pct)}%</text>
          <text x="${cx}" y="${cy+15}" text-anchor="middle" style="font-size:12px;fill:#888;font-family:Sarabun,sans-serif">${done}/${TOTAL}</text>
        </svg>
        <div>
          <div style="font-size:12px;color:#888">คะแนนขณะนี้</div>
          <div style="font-size:28px;font-weight:500;line-height:1.1">${ov>0?ov.toFixed(2):'—'}</div>
          ${l?badge(l):'<span style="font-size:12px;color:#bbb">รอคำตอบ...</span>'}
        </div>
      </div>
      <div style="font-size:11px;font-weight:500;color:#888;margin-bottom:8px">คะแนนแต่ละด้าน</div>
      ${bars}
      ${done===TOTAL?'<div style="padding:8px 12px;background:#E6EFF9;border-radius:8px;font-size:12px;color:#0C3362;text-align:center;margin-top:6px">✓ ตอบครบทุกข้อแล้ว</div>':''}
      <button onclick="goAgg()" style="width:100%;margin-top:14px;padding:11px;background:#1A4E8C;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px">
        📊 ดูสรุปผลทั้งหมด <span style="background:rgba(255,255,255,.25);padding:1px 9px;border-radius:20px;font-size:12px;font-weight:600">${S.subs.length} คน</span>
      </button>
    </div>
  </div>`;
}

/* ── helper: build stats map from a subset of subs ──────────────── */
function buildMap(subs){
  const map={};
  SEC.forEach(s=>{ map[s.id]=subs.flatMap(sub=>s.q.map(q=>sub.answers[q.id]||0).filter(v=>v>0)); });
  return map;
}

/* ── Aggregate Page ─────────────────────────────────────────────── */
function aggPage(){
  const allSubs=S.subs, totalN=allSubs.length, back=S.prevPage;
  const loadingBar=S.aggLoading?`<div style="background:#E6EFF9;border:1px solid #2563A8;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#0C3362;display:flex;align-items:center;gap:8px"><div class="spinner" style="width:18px;height:18px;border-width:2px;border-top-color:#2563A8"></div>กำลังโหลดข้อมูลล่าสุด...</div>`:'';
  if(!totalN) return `
    <div style="background:#1A4E8C;padding:1rem 1.5rem;display:flex;align-items:center;gap:12px">
      <button onclick="goPage('${back}')" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:7px 16px;color:#fff;font-size:13px">← กลับ</button>
      <div style="font-size:15px;font-weight:500;color:#fff">สรุปผลภาพรวม</div>
    </div>
    <div style="max-width:680px;margin:0 auto;padding:4rem 1.5rem;text-align:center">
      ${loadingBar}
      ${!S.aggLoading?`<div style="font-size:56px;margin-bottom:16px">📋</div>
      <div style="font-size:17px;font-weight:500;color:#111;margin-bottom:10px">ยังไม่มีข้อมูลการประเมิน</div>
      <div style="font-size:13px;color:#777;line-height:1.8;margin-bottom:28px">เมื่อมีผู้ส่งแบบประเมินแล้ว สรุปผลจะแสดงที่นี่</div>
      <button onclick="goPage('${back}')" style="padding:12px 32px;background:#1A4E8C;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500">กลับไปทำแบบประเมิน</button>`:''}
    </div>`;

  /* ── กรองเครือข่าย ──────────────────────────────────── */
  const netSet=[...new Set(allSubs.map(s=>s.network).filter(Boolean))].sort();
  const subs = S.aggNet ? allSubs.filter(s=>s.network===S.aggNet) : allSubs;
  const n = subs.length;
  const filterLabel = S.aggNet ? S.aggNet : 'ทุกเครือข่าย';

  /* ── คำนวณสถิติที่ถูกต้อง ──────────────────────────── */
  // map[sectionId] = array ของคะแนนทุกข้อทุกคนในด้านนั้น (ถูกต้อง)
  const map = buildMap(subs);

  // overall = เอาคะแนนทุกข้อของทุกคนมารวมกัน (ถูกต้อง ไม่ใช่ mean of means)
  const allScores = Object.values(map).flat();
  const ov = mean(allScores), ovSD = sd(allScores), l = lvl(ov);

  // คะแนนเฉลี่ยแต่ละด้าน (mean ของ array ข้อทั้งหมดในด้านนั้น)
  const secAvgs = SEC.map(s=>({...s, avg:mean(map[s.id]||[]), sdv:sd(map[s.id]||[])}));

  /* ── การกระจายคะแนน ─────────────────────────────────── */
  const dist={5:0,4:0,3:0,2:0,1:0};
  subs.forEach(sub=>ALL_IDS.forEach(id=>{const v=sub.answers[id];if(v)dist[v]++;}));
  const totalAns=allScores.length, maxD=Math.max(...Object.values(dist));

  /* ── กราฟแต่ละด้าน ───────────────────────────────────── */
  let bars='';
  secAvgs.forEach(s=>{
    const p=s.avg>0?((s.avg-1)/4)*100:0, sl=lvl(s.avg);
    bars+=`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:5px">
        <div style="display:flex;align-items:center;gap:7px">${secPill(s)}<span style="font-size:13px">${s.title}</span></div>
        <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">${badge(sl)}<span style="font-size:15px;font-weight:600">${s.avg.toFixed(2)}</span><span style="font-size:11px;color:#aaa">±${s.sdv.toFixed(2)}</span></div>
      </div>
      <div style="height:10px;background:#eee;border-radius:5px;overflow:hidden"><div style="height:100%;width:${p}%;background:${s.c};border-radius:5px;transition:width .5s"></div></div>
    </div>`;
  });

  /* ── การกระจาย ───────────────────────────────────────── */
  const DC={5:'#1D9E75',4:'#3B6D11',3:'#BA7517',2:'#993C1D',1:'#A32D2D'};
  const DL={5:'มากที่สุด',4:'มาก',3:'ปานกลาง',2:'น้อย',1:'น้อยที่สุด'};
  let distBars='';
  [5,4,3,2,1].forEach(v=>{
    const cnt=dist[v]||0, pV=totalAns?(cnt/totalAns)*100:0, bH=maxD?Math.max((cnt/maxD)*72,4):4;
    distBars+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:flex-end;height:100%">
      <span style="font-size:11px;color:#888">${pV.toFixed(1)}%</span>
      <div style="width:100%;background:${DC[v]};border-radius:4px 4px 0 0;height:${bH}px"></div>
      <div style="font-size:10px;color:#888;text-align:center;line-height:1.3"><b>${v}</b><br>${DL[v]}</div>
    </div>`;
  });

  /* ── dropdown filter ─────────────────────────────────── */
  const filterBar = `<div style="background:#fff;border:.5px solid #dde3ee;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:500;color:#555;flex-shrink:0">🔍 กรองเครือข่าย:</span>
    <select onchange="setAggNet(this.value)" style="flex:1;min-width:200px;padding:7px 10px;border:1.5px solid #c0d3ee;border-radius:8px;font-family:Sarabun,sans-serif;font-size:13px;background:#fff;color:#222">
      <option value="">ทุกเครือข่าย (${totalN} คน)</option>
      ${netSet.map(net=>`<option value="${net}" ${S.aggNet===net?'selected':''}>${net} (${allSubs.filter(s=>s.network===net).length} คน)</option>`).join('')}
    </select>
    ${S.aggNet?`<button onclick="setAggNet('')" style="padding:7px 14px;background:#FAECE7;color:#712B13;border:none;border-radius:8px;font-size:12px;font-family:Sarabun,sans-serif">✕ ล้างตัวกรอง</button>`:''}
  </div>`;

  return `
  <div style="background:#1A4E8C;padding:1rem 1.5rem;display:flex;align-items:center;gap:12px">
    <button onclick="goPage('${back}')" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:7px 16px;color:#fff;font-size:13px;font-weight:500">← กลับ</button>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:500;color:#fff">สรุปผลการประเมิน${S.aggNet?' — '+S.aggNet.replace('เครือข่ายพัฒนาคุณภาพการศึกษา','เครือข่าย').trim():' ภาพรวมทั้งหมด'}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.65)">ผู้ประเมิน ${n}${S.aggNet?' / '+totalN:''} คน · ${new Date().toLocaleDateString('th-TH',{dateStyle:'medium'})}</div>
    </div>
    <button onclick="refreshAgg()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 14px;color:#fff;font-size:12px;font-weight:500">🔄 รีเฟรช</button>
  </div>
  <div style="max-width:720px;margin:0 auto;padding:1.5rem">
    ${loadingBar}
    ${filterBar}
    ${n===0?`<div style="background:#FAEEDA;border-radius:10px;padding:2rem;text-align:center;color:#633806;font-size:13px">ไม่มีข้อมูลสำหรับเครือข่ายที่เลือก</div>`:`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
      ${[['ผู้ประเมิน',`${n} คน`,false],['คะแนนเฉลี่ยรวม',ov.toFixed(2),false],['ระดับความพึงพอใจ',badge(l),true]].map(([lb,v,raw])=>`<div style="background:#fff;border:.5px solid #dde3ee;border-radius:12px;padding:1rem;text-align:center"><div style="font-size:11px;color:#777;margin-bottom:5px">${lb}</div>${raw?v:`<div style="font-size:22px;font-weight:500">${v}</div>`}</div>`).join('')}
    </div>
    ${statsTable(map,`n = ${n} คน · รวม ${totalAns} คำตอบ · S.D. ภาพรวม = ${ovSD.toFixed(2)} · ${filterLabel}`)}
    ${card(`<div style="font-size:14px;font-weight:500;margin-bottom:14px">กราฟคะแนนแต่ละด้าน</div>${bars}`)}
    ${card(`<div style="font-size:14px;font-weight:500;margin-bottom:4px">การกระจายของคะแนน</div><div style="font-size:12px;color:#888;margin-bottom:14px">สัดส่วนคำตอบแต่ละระดับ (${totalAns} คำตอบ)</div><div style="display:flex;gap:10px;align-items:flex-end;height:100px">${distBars}</div>`)}
    `}
    <div style="display:flex;gap:10px;margin-top:4px">
      <button onclick="goPage('${back}')" style="flex:1;padding:12px;background:transparent;border:1px solid #ccc;border-radius:8px;font-size:13px;color:#666">← กลับ</button>
      <button onclick="reset_()" style="flex:2;padding:12px;background:#1A4E8C;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500">เริ่มประเมินใหม่</button>
    </div>
  </div>`;
}

/* ── Actions ────────────────────────────────────────────────────── */
window.ans     = (id,v)=>{ S.answers[id]=v; S.warn=false; render(); };
window.setInfo = (k,v)=>{ S[k]=v; S.warnInfo=false; if(k!=="respondentOther") render(); };
window.setOpen = (k,v)=>{ S[k]=v; };
window.goPage  = (p)=>{ S.page=p; render(); window.scrollTo(0,0); };
window.reset_  = ()=>{ S.answers={}; S.openStrength=''; S.openSuggest=''; S.openNeed=''; S.openOther=''; S.warn=false; S.warnInfo=false; S.network=''; S.visitDate=''; S.respondentType=''; S.respondentOther=''; S.aggNet=''; S.page='survey'; render(); window.scrollTo(0,0); };

window.setAggNet = (v)=>{ S.aggNet=v; render(); };

window.goAgg = async () => {
  S.prevPage=S.page; S.page='agg'; S.aggLoading=true; render();
  await apiRefresh();
  S.aggLoading=false; render();
};
window.refreshAgg = async () => { S.aggLoading=true; render(); await apiRefresh(); S.aggLoading=false; render(); };

window.submit_ = async () => {
  const missing=ALL_IDS.filter(id=>!S.answers[id]);
  if(missing.length){ S.warn=true; render(); const el=document.getElementById('row_'+missing[0]); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); return; }
  if(!S.network||!S.visitDate||!S.respondentType){ S.warnInfo=true; render(); window.scrollTo(0,0); return; }
  const sub={
    id:Date.now(),
    network:S.network, visitDate:S.visitDate,
    respondentType:S.respondentType+(S.respondentType==='อื่นๆ'&&S.respondentOther?' ('+S.respondentOther+')':''),
    answers:{...S.answers},
    openStrength:S.openStrength, openSuggest:S.openSuggest, openNeed:S.openNeed, openOther:S.openOther
  };
  S.subs.push(sub);
  S.prevPage='survey'; S.page='result'; S.submitPending=true; render();
  await apiSave(sub);
  S.submitPending=false; render();
};

/* ── Render ─────────────────────────────────────────────────────── */
function render(){
  const app=document.getElementById('app');
  if     (S.page==='loading') app.innerHTML=loadingHTML();
  else if(S.page==='survey')  app.innerHTML=surveyPage();
  else if(S.page==='result')  app.innerHTML=resultPage();
  else                        app.innerHTML=aggPage();
}

render();
apiLoad();
</script>

const SHEET_ID  = '1D9Ju_FS-ucZPMR_PmewBK4jNPpZqEdPvAiTuKs3uQKI';
const SHEET_TAB = 'ชีต1';

function doGet(e) {
  const ss   = SpreadsheetApp.openById(SHEET_ID);
  const sh   = ss.getSheetByName(SHEET_TAB);
  const rows = sh.getDataRange().getValues();
  if (rows.length <= 1) return out({ok:true, data:[]});
  const headers = rows[0];
  const data = rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i]);
    // rebuild answers object
    const answers = {};
    for (let q = 1; q <= 28; q++) {
      const v = obj['q'+q];
      if (v) answers['q'+q] = Number(v);
    }
    return {
      id:         obj['id'] || Date.now(),
      network:    obj['network'] || '',
      visitDate:  obj['visitDate'] || '',
      respondentType: obj['respondentType'] || '',
      answers,
      openStrength: obj['openStrength'] || '',
      openSuggest:  obj['openSuggest']  || '',
      openNeed:     obj['openNeed']     || '',
      openOther:    obj['openOther']    || '',
    };
  });
  return out({ok:true, data});
}

function doPost(e) {
  try {
    const sub  = JSON.parse(e.postData.contents);
    const ss   = SpreadsheetApp.openById(SHEET_ID);
    const sh   = ss.getSheetByName(SHEET_TAB);
    if (sh.getLastRow() === 0) {
      // สร้าง header row
      const headers = ['id','network','visitDate','respondentType',
        ...Array.from({length:28},(_,i)=>'q'+(i+1)),
        'openStrength','openSuggest','openNeed','openOther','submittedAt'];
      sh.appendRow(headers);
    }
    const row = [
      sub.id, sub.network||'', sub.visitDate||'', sub.respondentType||'',
      ...Array.from({length:28},(_,i)=>sub.answers['q'+(i+1)]||''),
      sub.openStrength||'', sub.openSuggest||'', sub.openNeed||'', sub.openOther||'',
      new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok'})
    ];
    sh.appendRow(row);
    return out({ok:true});
  } catch(err) {
    return out({ok:false, error:err.message});
  }
}

function out(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}
